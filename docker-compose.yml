name: cageledger

services:
  cageledger:
    image: ghcr.io/hugo-yh/cageledger:${CAGELEDGER_IMAGE_TAG:-latest}
    container_name: cageledger
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CAGELEDGER_ADMIN_USERNAME=admin
      - CAGELEDGER_ADMIN_PASSWORD=admin123
    volumes:
      - ./data:/app/data
