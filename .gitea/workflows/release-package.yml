name: Publish release package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-package-${{ gitea.ref_name }}
  cancel-in-progress: false

permissions:
  code: read
  releases: write

jobs:
  package:
    runs-on: ubuntu-latest
    container: node:22-bookworm
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates curl python3
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_REF_NAME}"
          git checkout --detach FETCH_HEAD

      - name: Verify package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG_VERSION}" >&2
            exit 1
          fi
          grep -Fq "APP_VERSION = \"${TAG_VERSION}\"" src/react/version.ts
          grep -Fq "version: \"${TAG_VERSION}\"" src/react/releaseNotes*.ts

      - name: Install release packaging dependencies
        run: |
          bash scripts/retry_command.sh npm ci --prefer-offline --no-audit \
            --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=120000

      - name: Verify release source
        run: |
          npm run typecheck
          npm run test
          npm run build

      - name: Build and upload offline package
        id: package
        run: |
          PACKAGE_PATH="$(npm run --silent package:offline)"
          echo "path=${PACKAGE_PATH}" >> "$GITEA_OUTPUT"
          echo "name=$(basename "${PACKAGE_PATH}")" >> "$GITEA_OUTPUT"

      - name: Create or load Gitea release
        id: release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          API_BASE="${GITHUB_SERVER_URL%/}/api/v1"
          RELEASE_FILE="$(mktemp)"
          STATUS="$(curl -sS -o "${RELEASE_FILE}" -w '%{http_code}' \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${API_BASE}/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")"
          if [ "${STATUS}" = "200" ]; then
            RELEASE_JSON="$(cat "${RELEASE_FILE}")"
          elif [ "${STATUS}" = "404" ]; then
            RELEASE_JSON="$(curl -fsS -X POST \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${GITHUB_REF_NAME}\",\"name\":\"CageLedger ${GITHUB_REF_NAME}\"}" \
              "${API_BASE}/repos/${GITHUB_REPOSITORY}/releases")"
          else
            cat "${RELEASE_FILE}" >&2
            echo "Unable to load Gitea release: HTTP ${STATUS}" >&2
            exit 1
          fi
          rm -f "${RELEASE_FILE}"
          RELEASE_ID="$(printf '%s' "${RELEASE_JSON}" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          echo "id=${RELEASE_ID}" >> "$GITEA_OUTPUT"

      - name: Upload offline package
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          API_BASE="${GITHUB_SERVER_URL%/}/api/v1"
          ASSET_NAME="${{ steps.package.outputs.name }}"
          ASSETS_JSON="$(curl -fsS \
            -H "Authorization: token ${GITEA_TOKEN}" \
            "${API_BASE}/repos/${GITHUB_REPOSITORY}/releases/${{ steps.release.outputs.id }}/assets")"
          ASSET_ID="$(printf '%s' "${ASSETS_JSON}" | python3 -c 'import json,sys; name=sys.argv[1]; print(next((item["id"] for item in json.load(sys.stdin) if item.get("name") == name), ""))' "${ASSET_NAME}")"
          if [ -n "${ASSET_ID}" ]; then
            echo "Release asset ${ASSET_NAME} already exists; keeping the immutable tag artifact."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@${{ steps.package.outputs.path }}" \
            "${API_BASE}/repos/${GITHUB_REPOSITORY}/releases/${{ steps.release.outputs.id }}/assets?name=${ASSET_NAME}"
