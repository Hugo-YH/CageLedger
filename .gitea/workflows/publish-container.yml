name: Publish container package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-container-${{ gitea.ref_name }}
  cancel-in-progress: false

permissions:
  code: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    container: node:22-bookworm
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates python3 python3-venv shellcheck
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_REF_NAME}"
          git checkout --detach FETCH_HEAD

      - name: Install quality dependencies
        run: |
          bash scripts/retry_command.sh npm ci --prefer-offline --no-audit \
            --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=120000
          python3 -m venv .venv
          bash scripts/retry_command.sh .venv/bin/pip install --no-cache-dir --retries 5 --timeout 60 \
            -r requirements-dev.txt

      - name: Run release quality checks
        run: PATH="$PWD/.venv/bin:$PATH" npm run check

  publish:
    needs: verify
    runs-on: ubuntu-latest
    container: docker:cli
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apk add --no-cache git ca-certificates
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_REF_NAME}"
          git checkout --detach FETCH_HEAD

      - name: Resolve revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITEA_OUTPUT"

      - name: Verify package version
        id: version
        run: |
          PACKAGE_VERSION="$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG_VERSION}" >&2
            exit 1
          fi
          grep -Fq "APP_VERSION = \"${TAG_VERSION}\"" src/react/version.ts
          grep -Fq "version: \"${TAG_VERSION}\"" src/react/releaseNotes*.ts
          echo "value=${TAG_VERSION}" >> "$GITEA_OUTPUT"

      - name: Log in to Gitea Container Registry
        env:
          REGISTRY_TOKEN: ${{ secrets.PACKAGE_PAT }}
          REGISTRY_USERNAME: ${{ vars.PACKAGE_USERNAME }}
        run: echo "${REGISTRY_TOKEN}" | docker login "${GITHUB_SERVER_URL#https://}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Wait for Mac mini multi-arch publish
        env:
          IMAGE_TAG: ${{ steps.version.outputs.value }}
        run: |
          REGISTRY="${GITHUB_SERVER_URL#https://}"
          REPOSITORY="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="${REGISTRY}/${REPOSITORY}"
          IMAGE_TAG="v${IMAGE_TAG}"
          for IMAGE in \
            "${IMAGE_REPO}:${IMAGE_TAG}" \
            "${IMAGE_REPO}:${IMAGE_TAG}-amd64" \
            "${IMAGE_REPO}:${IMAGE_TAG}-arm64"; do
            FOUND=0
            for ATTEMPT in $(seq 1 40); do
              if docker manifest inspect "${IMAGE}" >/dev/null 2>&1; then
                FOUND=1
                break
              fi
              sleep 15
            done
            if [ "${FOUND}" -ne 1 ]; then
              echo "Published image ${IMAGE} is missing" >&2
              exit 1
            fi
          done

      - name: Verify multi-arch manifest
        env:
          IMAGE_TAG: ${{ steps.version.outputs.value }}
        run: |
          REGISTRY="${GITHUB_SERVER_URL#https://}"
          REPOSITORY="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="${REGISTRY}/${REPOSITORY}"
          IMAGE_TAG="v${IMAGE_TAG}"
          RAW_MANIFEST="$(docker manifest inspect "${IMAGE_REPO}:${IMAGE_TAG}")"
          if ! printf '%s' "${RAW_MANIFEST}" | grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"amd64"'; then
            echo "Image ${IMAGE_REPO}:${IMAGE_TAG} is missing amd64 support" >&2
            exit 1
          fi
          if ! printf '%s' "${RAW_MANIFEST}" | grep -Eq '"architecture"[[:space:]]*:[[:space:]]*"arm64"'; then
            echo "Image ${IMAGE_REPO}:${IMAGE_TAG} is missing arm64 support" >&2
            exit 1
          fi
