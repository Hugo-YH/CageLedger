name: Publish container package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-container-${{ gitea.ref_name }}
  cancel-in-progress: false

permissions:
  code: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    container: node:22-bookworm
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates python3 python3-venv shellcheck
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_REF_NAME}"
          git checkout --detach FETCH_HEAD

      - name: Install quality dependencies
        run: |
          npm ci
          python3 -m venv .venv
          .venv/bin/pip install --no-cache-dir -r requirements-dev.txt

      - name: Run release quality checks
        run: PATH="$PWD/.venv/bin:$PATH" npm run check

  publish:
    needs: verify
    runs-on: ubuntu-latest
    container: docker:cli
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apk add --no-cache git ca-certificates
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_REF_NAME}"
          git checkout --detach FETCH_HEAD

      - name: Resolve revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITEA_OUTPUT"

      - name: Verify package version
        id: version
        run: |
          PACKAGE_VERSION="$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n 1)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG_VERSION}" >&2
            exit 1
          fi
          grep -Fq "APP_VERSION = \"${TAG_VERSION}\"" src/react/version.ts
          grep -Fq "version: \"${TAG_VERSION}\"" src/react/releaseNotes.ts
          echo "value=${TAG_VERSION}" >> "$GITEA_OUTPUT"

      - name: Log in to Gitea Container Registry
        env:
          REGISTRY_TOKEN: ${{ secrets.PACKAGE_PAT }}
          REGISTRY_USERNAME: ${{ vars.PACKAGE_USERNAME }}
        run: echo "${REGISTRY_TOKEN}" | docker login "${GITHUB_SERVER_URL#https://}" -u "${REGISTRY_USERNAME}" --password-stdin

      - name: Build and publish image
        env:
          IMAGE_TAG: ${{ gitea.ref_name }}
        run: |
          IMAGE_TAG="${IMAGE_TAG#v}"
          IMAGE_REPO="${GITHUB_SERVER_URL#https://}/$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          docker build \
            --build-arg CAGELEDGER_APP_VERSION="${{ steps.version.outputs.value }}" \
            --build-arg CAGELEDGER_REVISION="${{ steps.revision.outputs.sha }}" \
            -t "${IMAGE_REPO}:${IMAGE_TAG}" \
            -t "${IMAGE_REPO}:latest" \
            .
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:latest"
