name: Sync wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"

permissions:
  code: read
  wiki: write

jobs:
  sync:
    runs-on: ubuntu-latest
    container: alpine:3.20
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apk add --no-cache git ca-certificates
          git init source
          cd source
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Sync repository wiki
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          git init target
          cd target
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.wiki.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin main
          git checkout -B main FETCH_HEAD
          cd ..
          find target -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R source/wiki/. target/
          cd target
          git config user.name "gitea-actions"
          git config user.email "actions@cellnucle.us"
          if [ -z "$(git status --porcelain)" ]; then
            echo "Wiki already up to date."
            exit 0
          fi
          git add .
          git commit -m "docs: sync wiki from ${GITHUB_SHA}"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" push origin HEAD:main
