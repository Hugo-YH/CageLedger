name: Continuous integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ gitea.ref }}
  cancel-in-progress: true

permissions:
  code: read

jobs:
  quality:
    name: Lightweight quality gate
    runs-on: ubuntu-latest
    container: node:22-bookworm
    steps:
      - name: Check out source
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git python3 python3-pip shellcheck
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: token ${GITEA_TOKEN}" fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install quality dependencies
        run: |
          bash scripts/retry_command.sh npm ci --prefer-offline --no-audit \
            --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=120000
          python3 -m pip install --no-cache-dir ruff

      - name: Run lightweight quality gate
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          node scripts/check_architecture.mjs --enforce
