name: Publish container package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build"
        required: true
        default: "main"
      image_tag:
        description: "Container image tag"
        required: true
        default: "snapshot"

concurrency:
  group: publish-container-${{ github.event_name }}-${{ github.ref_name || inputs.source_ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "source_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.source_ref }}

      - name: Resolve revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CAGELEDGER_VERSION=${{ steps.revision.outputs.sha }}
          tags: |
            ghcr.io/hugo-yh/cageledger:${{ steps.ref.outputs.image_tag }}
            ghcr.io/hugo-yh/cageledger:latest
