name: Publish release package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to package"
        required: true
        default: "v0.0.0"

concurrency:
  group: release-package-${{ github.event_name }}-${{ github.ref_name || inputs.source_ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.source_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ steps.ref.outputs.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG_VERSION}" >&2
            exit 1
          fi

      - name: Build offline package
        id: package
        run: |
          PACKAGE_PATH="$(npm run --silent package:offline)"
          echo "path=${PACKAGE_PATH}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${PACKAGE_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ref.outputs.tag_name }}" \
            "${{ steps.package.outputs.path }}" \
            --title "CageLedger ${{ steps.ref.outputs.tag_name }}" \
            --generate-notes
